<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Waste Warrior</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
html { scroll-padding-top: 80px; }
body { background-color: #fdfdfd; color: #111; line-height: 1.6; }
header { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 2rem; background-color: #f9fafb; box-shadow: 0 2px 6px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
.logo { font-weight: 700; font-size: 1.5rem; color: #ff6f61; text-decoration: none; }
nav a { margin-left: 2rem; text-decoration: none; color: #111; font-weight: 500; transition: color 0.3s; }
nav a:hover { color: #3B82F6; }

.page-hero {
  text-align: center;
  padding: 4rem 2rem 2rem;
  background: linear-gradient(135deg, #2563EB 0%, #1E40AF 100%);
  color: #fff;
}
.page-hero h1 { font-size: 2.5rem; margin-bottom: 0.75rem; }
.page-hero p { font-size: 1.1rem; opacity: 0.9; }

.contact-section {
  max-width: 560px;
  margin: 3rem auto;
  padding: 0 2rem 4rem;
}

form {
  background: #fff;
  border-radius: 16px;
  padding: 2.5rem;
  box-shadow: 0 4px 20px rgba(0,0,0,0.07);
  border: 1px solid #F3F4F6;
}

.form-group { margin-bottom: 1.5rem; }
label { display: block; font-size: 0.9rem; font-weight: 600; color: #374151; margin-bottom: 0.5rem; }
input, textarea, select {
  width: 100%;
  padding: 0.75rem 1rem;
  border: 2px solid #E5E7EB;
  border-radius: 10px;
  font-size: 1rem;
  color: #111;
  background: #FAFAFA;
  transition: border-color 0.2s;
  font-family: 'Inter', sans-serif;
}
input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: #3B82F6;
  background: #fff;
}
textarea { resize: vertical; min-height: 140px; }

.btn-submit {
  width: 100%;
  padding: 0.9rem;
  background: linear-gradient(135deg, #2563EB 0%, #1E40AF 100%);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.2s;
}
.btn-submit:hover { opacity: 0.92; transform: translateY(-1px); }

.success-msg {
  display: none;
  background: #F0FDF4;
  border: 1px solid #BBF7D0;
  color: #065F46;
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin-bottom: 1.5rem;
  font-weight: 500;
}

footer { padding: 2rem; text-align: center; background-color: #fff; color: #888; border-top: 1px solid #eee; font-size: 0.9rem; }
footer a { color: #888; text-decoration: none; margin: 0 0.5rem; }
footer a:hover { color: #3B82F6; }

@media(max-width: 768px) {
  .page-hero h1 { font-size: 2rem; }
  nav a { margin-left: 1rem; }
  form { padding: 1.75rem; }
}
</style>
</head>
<body>

<header>
  <a href="/waste-warrior/" class="logo">KindKode</a>
  <nav>
    <a href="/waste-warrior/#features">Features</a>
    <a href="/waste-warrior/#pricing">Pricing</a>
    <a href="/waste-warrior/#legal">Legal</a>
    <a href="/waste-warrior/contact/">Contact</a>
  </nav>
</header>

<section class="page-hero">
  <h1>Get in Touch</h1>
  <p>Have a question or feedback? We'd love to hear from you.</p>
</section>

<section class="contact-section">
  <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field">
    <input type="hidden" name="form-name" value="contact">
    <p style="display:none"><input name="bot-field"></p>

    <div class="success-msg" id="successMsg">
      ✅ Thanks for reaching out! We'll get back to you soon.
    </div>

    <div class="form-group">
      <label for="name">Your Name</label>
      <input type="text" id="name" name="name" placeholder="Jane Smith" required>
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="jane@example.com" required>
    </div>

    <div class="form-group">
      <label for="subject">Subject</label>
      <select id="subject" name="subject">
        <option value="general">General Question</option>
        <option value="support">App Support</option>
        <option value="billing">Billing / Subscription</option>
        <option value="feedback">Feedback</option>
        <option value="other">Other</option>
      </select>
    </div>

    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="How can we help?" required></textarea>
    </div>

    <button type="submit" class="btn-submit">Send Message →</button>
  </form>
</section>

<footer>
  &copy; 2026 KindKode &nbsp;·&nbsp;
  <a href="/waste-warrior/">Waste Warrior</a> &nbsp;·&nbsp;
  <a href="/waste-warrior/terms/">Terms</a> &nbsp;·&nbsp;
  <a href="/waste-warrior/privacy/">Privacy</a> &nbsp;·&nbsp;
  <a href="/waste-warrior/contact/">Contact</a>
</footer>

</body>
</html>
